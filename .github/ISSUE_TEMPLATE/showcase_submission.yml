name: Showcase submission
description: Built a site with Astro Rocket? Submit it for the showcase.
title: "[Showcase] "
labels: ["showcase"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for building with Astro Rocket! 🚀

        Fill in the details below and your site can be featured in the
        README's [Showcase](https://github.com/hansmartensdev/Astro-Rocket#showcase)
        section. A live URL and a line about the project is all it takes.
  - type: input
    id: site-name
    attributes:
      label: Site / project name
      placeholder: e.g. LinkPress
    validations:
      required: true
  - type: input
    id: site-url
    attributes:
      label: Live URL
      description: The site must be publicly reachable.
      placeholder: https://example.com
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: About the project
      description: One or two lines about what the site is — this text (possibly lightly edited) appears on your showcase card.
      placeholder: What is the site, and what does it do?
    validations:
      required: true
  - type: input
    id: credit
    attributes:
      label: How should you be credited?
      description: Your name as it should appear on the card, optionally with a link (personal site, LinkedIn, GitHub…).
      placeholder: "Jane Doe — https://janedoe.dev"
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: The site is live and built with the Astro Rocket theme.
          required: true
        - label: A screenshot of the site may be used in the README and related blog posts.
          required: false
        - label: A short quote from this submission may be used as a testimonial.
          required: false
